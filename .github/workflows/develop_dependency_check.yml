name: Security Checks

on:
  pull_request:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write
  issues: write
  pull-requests: write

jobs:

  gitleaks_scan:
    name: Gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy_scan:
    name: Trivy scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          yarn install

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./"
          format: "json"
          output: "trivy-report.json"
          severity: "HIGH,CRITICAL"
          exit-code: 1
          scanners: vuln,secret,misconfig

      - name: Run Trivy Convert report
        if: always()
        run: |
          trivy convert \
            --format template \
            --output trivy-summary.html \
            --template @/${{ github.workspace }}/.github/templates/trivy_summary.tpl \
            trivy-report.json
          trivy convert \
            --format sarif \
            --output trivy-report.sarif \
            trivy-report.json

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-report.sarif

      - name: Publish Trivy summary
        if: always()
        run: |
          cat trivy-summary.html >> $GITHUB_STEP_SUMMARY

  semgrep_scan:
    name: Semgrep scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep Scan
        run: |
          semgrep scan \
            --config auto \
            --text \
            --text-output semgrep-report.text \
            --sarif \
            --sarif-output semgrep-report.sarif \
            --error --quiet ./src

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-report.sarif

      - name: Publish Semgrep summary
        if: always()
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat semgrep-report.text >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY